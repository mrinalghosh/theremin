<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Theremin</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #0b0d12;
    color: #e8ecf1;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    user-select: none;
  }
  #stage {
    position: fixed;
    inset: 0;
    cursor: crosshair;
  }
  #xLabel {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    letter-spacing: 0.1em;
    color: #8a93a3;
  }
  #yLabel {
    position: fixed;
    top: 50%;
    left: 12px;
    transform: translateY(-50%) rotate(-90deg);
    transform-origin: left center;
    font-size: 14px;
    letter-spacing: 0.1em;
    color: #8a93a3;
  }
  #readout {
    position: fixed;
    top: 12px;
    right: 16px;
    font-variant-numeric: tabular-nums;
    font-size: 14px;
    color: #cfd6e2;
    text-align: right;
    line-height: 1.5;
  }
  #help {
    position: fixed;
    top: 12px;
    left: 16px;
    font-size: 13px;
    color: #8a93a3;
    line-height: 1.5;
  }
  #help kbd {
    background: #1c2230;
    border: 1px solid #2a3245;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 12px;
    color: #cfd6e2;
  }
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(11, 13, 18, 0.85);
    font-size: 18px;
    color: #cfd6e2;
    cursor: pointer;
    z-index: 10;
  }
  #handsBtn, #arpBtn {
    position: fixed;
    bottom: 12px;
    background: #1c2230;
    border: 1px solid #2a3245;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    color: #cfd6e2;
    cursor: pointer;
    font-family: inherit;
  }
  #handsBtn { right: 16px; }
  #arpBtn { right: 130px; }
  #handsBtn:hover, #arpBtn:hover { background: #232b3d; }
  #handsBtn.active {
    background: #2a4d8a;
    border-color: #4a78c5;
    color: #fff;
  }
  #arpBtn.active {
    background: #8a4d2a;
    border-color: #c5784a;
    color: #fff;
  }
  #cam {
    position: fixed;
    bottom: 60px;
    right: 16px;
    width: 200px;
    height: 150px;
    border-radius: 6px;
    border: 1px solid #2a3245;
    transform: scaleX(-1);
    object-fit: cover;
    background: #000;
    display: none;
  }
  #cam.visible { display: block; }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="xLabel">Frequency  →  (X axis)</div>
<div id="yLabel">Volume  →  (Y axis)</div>
<div id="help">
  <div><kbd>Click</kbd> lock point</div>
  <div><kbd>Space</kbd> mute toggle</div>
  <div><kbd>Delete</kbd> remove last point</div>
  <div><kbd>1</kbd> sine  <kbd>2</kbd> square  <kbd>3</kbd> saw  <kbd>4</kbd> triangle</div>
  <div><kbd>A</kbd> arpeggiator toggle</div>
  <div style="margin-top: 6px; opacity: 0.7;">Hand mode: right index = cursor, left pinch = lock</div>
</div>
<div id="readout">
  <div id="freqOut">— Hz</div>
  <div id="volOut">— %</div>
  <div id="waveOut">sine</div>
  <div id="muteOut"></div>
  <div id="countOut">0 locked</div>
</div>
<video id="cam" autoplay playsinline muted></video>
<button id="arpBtn">Arp: off</button>
<button id="handsBtn">Hands: off</button>
<div id="overlay">click anywhere to start</div>

<script>
(() => {
  const MIN_FREQ = 80;
  const MAX_FREQ = 1200;
  const MAX_GAIN = 0.25;

  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  const freqOut = document.getElementById('freqOut');
  const volOut = document.getElementById('volOut');
  const countOut = document.getElementById('countOut');
  const waveOut = document.getElementById('waveOut');
  const muteOut = document.getElementById('muteOut');
  const overlay = document.getElementById('overlay');
  const handsBtn = document.getElementById('handsBtn');
  const arpBtn = document.getElementById('arpBtn');
  const cam = document.getElementById('cam');

  let W = 0, H = 0;
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // Map x in [0, W] to frequency (logarithmic feels more musical)
  function xToFreq(x) {
    const t = Math.max(0, Math.min(1, x / W));
    return MIN_FREQ * Math.pow(MAX_FREQ / MIN_FREQ, t);
  }
  // Map y in [0, H] to gain (top = loud, bottom = quiet)
  function yToGain(y) {
    const t = Math.max(0, Math.min(1, 1 - y / H));
    return t * MAX_GAIN;
  }
  function yToVolPct(y) {
    return Math.round(Math.max(0, Math.min(1, 1 - y / H)) * 100);
  }
  function freqToX(f) {
    const t = Math.log(f / MIN_FREQ) / Math.log(MAX_FREQ / MIN_FREQ);
    return t * W;
  }
  function gainToY(g) {
    return (1 - g / MAX_GAIN) * H;
  }

  let audioCtx = null;
  let masterGain = null;
  let liveOsc = null;
  let liveGain = null;
  let mouseX = W / 2;
  let mouseY = H / 2;
  let mouseInside = false;
  const WAVE_TYPES = ['sine', 'square', 'sawtooth', 'triangle'];
  const WAVE_COLORS = {
    sine: '#5fb3ff',
    square: '#ff7e7e',
    sawtooth: '#ffd166',
    triangle: '#7be495',
  };
  let currentWave = 'sine';
  let muted = false;
  const lockedPoints = []; // { freq, gain, osc, gainNode, x, y, type }

  function startAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = muted ? 0 : 1;
    masterGain.connect(audioCtx.destination);

    liveGain = audioCtx.createGain();
    liveGain.gain.value = 0;
    liveGain.connect(masterGain);

    liveOsc = audioCtx.createOscillator();
    liveOsc.type = currentWave;
    liveOsc.frequency.value = xToFreq(mouseX);
    liveOsc.connect(liveGain);
    liveOsc.start();
  }

  function updateLive() {
    if (!audioCtx) return;
    const targetFreq = xToFreq(mouseX);
    const targetGain = (mouseInside && !arpActive) ? yToGain(mouseY) : 0;
    const t = audioCtx.currentTime;
    liveOsc.frequency.setTargetAtTime(targetFreq, t, 0.01);
    liveGain.gain.setTargetAtTime(targetGain, t, 0.02);
  }

  function lockPoint() {
    if (!audioCtx || !mouseInside) return;
    const freq = xToFreq(mouseX);
    const gain = yToGain(mouseY);
    const type = currentWave;
    const osc = audioCtx.createOscillator();
    osc.type = type;
    osc.frequency.value = freq;
    const g = audioCtx.createGain();
    g.gain.value = arpActive ? 0 : gain;
    osc.connect(g);
    g.connect(masterGain);
    osc.start();
    lockedPoints.push({ freq, gain, osc, gainNode: g, x: mouseX, y: mouseY, type });
  }

  function deleteLastPoint() {
    const p = lockedPoints.pop();
    if (!p || !audioCtx) return;
    const t = audioCtx.currentTime;
    try { p.gainNode.gain.cancelScheduledValues(t); } catch (_) {}
    try { p.gainNode.gain.setValueAtTime(0, t); } catch (_) {}
    try { p.osc.stop(t); } catch (_) {}
    try { p.osc.disconnect(); } catch (_) {}
    try { p.gainNode.disconnect(); } catch (_) {}
    if (arpActive && lockedPoints.length === 0) stopArp();
  }

  let arpActive = false;
  let arpTimer = null;
  let arpIndex = 0;
  const ARP_STEP_MS = 250;
  const ARP_NOTE_MS = 200;

  function arpStep() {
    if (!arpActive || !audioCtx || lockedPoints.length === 0) return;
    arpIndex = arpIndex % lockedPoints.length;
    const p = lockedPoints[arpIndex];
    const t = audioCtx.currentTime;
    const attack = 0.01;
    const release = 0.05;
    const noteDur = ARP_NOTE_MS / 1000;
    try {
      p.gainNode.gain.cancelScheduledValues(t);
      p.gainNode.gain.setValueAtTime(0, t);
      p.gainNode.gain.linearRampToValueAtTime(p.gain, t + attack);
      p.gainNode.gain.setValueAtTime(p.gain, t + noteDur);
      p.gainNode.gain.linearRampToValueAtTime(0, t + noteDur + release);
    } catch (_) {}
    arpIndex++;
  }

  function startArp() {
    if (arpActive || !audioCtx || lockedPoints.length === 0) return;
    arpActive = true;
    arpIndex = 0;
    const tNow = audioCtx.currentTime;
    for (const p of lockedPoints) {
      try {
        p.gainNode.gain.cancelScheduledValues(tNow);
        p.gainNode.gain.setValueAtTime(0, tNow);
      } catch (_) {}
    }
    arpBtn.classList.add('active');
    arpBtn.textContent = 'Arp: on';
    if (liveGain) {
      try {
        liveGain.gain.cancelScheduledValues(tNow);
        liveGain.gain.setTargetAtTime(0, tNow, 0.02);
      } catch (_) {}
    }
    arpStep();
    arpTimer = setInterval(arpStep, ARP_STEP_MS);
  }

  function stopArp() {
    if (!arpActive) return;
    arpActive = false;
    if (arpTimer) { clearInterval(arpTimer); arpTimer = null; }
    arpBtn.classList.remove('active');
    arpBtn.textContent = 'Arp: off';
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    for (const p of lockedPoints) {
      try {
        p.gainNode.gain.cancelScheduledValues(t);
        p.gainNode.gain.setTargetAtTime(p.gain, t, 0.02);
      } catch (_) {}
    }
    updateLive();
  }

  function toggleArp() {
    if (arpActive) stopArp();
    else startArp();
  }

  arpBtn.addEventListener('click', () => {
    arpBtn.blur();
    if (!audioCtx) return;
    toggleArp();
  });

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = 'rgba(138, 147, 163, 0.08)';
    ctx.lineWidth = 1;
    for (let i = 1; i < 10; i++) {
      const x = (i / 10) * W;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let i = 1; i < 6; i++) {
      const y = (i / 6) * H;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // Frequency tick labels
    ctx.fillStyle = 'rgba(138, 147, 163, 0.5)';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    [100, 200, 400, 800].forEach(f => {
      const x = freqToX(f);
      ctx.fillText(f + ' Hz', x, H - 28);
    });

    // Locked points
    for (const p of lockedPoints) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
      ctx.fillStyle = WAVE_COLORS[p.type] || '#5fb3ff';
      ctx.fill();
      ctx.strokeStyle = '#0b0d12';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Live cursor crosshair
    if (mouseInside && audioCtx) {
      ctx.strokeStyle = 'rgba(255, 180, 100, 0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(mouseX, 0); ctx.lineTo(mouseX, H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, mouseY); ctx.lineTo(W, mouseY); ctx.stroke();

      ctx.beginPath();
      ctx.arc(mouseX, mouseY, 10, 0, Math.PI * 2);
      ctx.fillStyle = '#ffb464';
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);

  function updateReadout() {
    if (mouseInside) {
      freqOut.textContent = Math.round(xToFreq(mouseX)) + ' Hz';
      volOut.textContent = yToVolPct(mouseY) + ' %';
    } else {
      freqOut.textContent = '— Hz';
      volOut.textContent = '— %';
    }
    countOut.textContent = lockedPoints.length + ' locked';
    waveOut.textContent = currentWave;
    waveOut.style.color = WAVE_COLORS[currentWave];
    muteOut.textContent = muted ? 'MUTED' : '';
    muteOut.style.color = '#ff7e7e';
  }

  let handsActive = false;
  window.addEventListener('mousemove', e => {
    if (handsActive) return;
    mouseX = e.clientX;
    mouseY = e.clientY;
    mouseInside = true;
    updateLive();
    updateReadout();
  });
  window.addEventListener('mouseleave', () => {
    if (handsActive) return;
    mouseInside = false;
    updateLive();
    updateReadout();
  });
  window.addEventListener('mouseenter', () => {
    if (handsActive) return;
    mouseInside = true;
    updateLive();
    updateReadout();
  });

  function toggleMute() {
    muted = !muted;
    if (audioCtx && masterGain) {
      const t = audioCtx.currentTime;
      try { masterGain.gain.cancelScheduledValues(t); } catch (_) {}
      try { masterGain.gain.setTargetAtTime(muted ? 0 : 1, t, 0.02); } catch (_) {}
    }
  }

  function handleKey(e) {
    const k = e.key;
    if (k === ' ' || e.code === 'Space') {
      e.preventDefault();
      toggleMute();
      updateReadout();
    } else if (k === 'Delete' || k === 'Backspace') {
      e.preventDefault();
      deleteLastPoint();
      updateReadout();
    } else if (k === 'a' || k === 'A') {
      e.preventDefault();
      if (audioCtx) toggleArp();
    } else if (k >= '1' && k <= '4') {
      e.preventDefault();
      const idx = parseInt(k, 10) - 1;
      currentWave = WAVE_TYPES[idx];
      if (liveOsc) {
        try { liveOsc.type = currentWave; } catch (_) {}
      }
      updateReadout();
    }
  }
  window.addEventListener('keydown', handleKey);

  overlay.addEventListener('click', () => {
    startAudio();
    overlay.style.display = 'none';
    updateReadout();
  });

  canvas.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (!audioCtx) return;
    mouseX = e.clientX;
    mouseY = e.clientY;
    mouseInside = true;
    lockPoint();
    updateReadout();
  });

  // Bridge for the hand-tracking module
  window.__theremin = {
    setCursor(x, y) {
      mouseX = x;
      mouseY = y;
      mouseInside = true;
      updateLive();
      updateReadout();
    },
    clearCursor() {
      mouseInside = false;
      updateLive();
      updateReadout();
    },
    lock() {
      lockPoint();
      updateReadout();
    },
    deleteLast() {
      deleteLastPoint();
      updateReadout();
    },
    hasAudio() { return !!audioCtx; },
    setHandsActive(v) { handsActive = !!v; },
    get W() { return W; },
    get H() { return H; },
  };
})();
</script>

<script type="module">
import { HandLandmarker, FilesetResolver }
  from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

const handsBtn = document.getElementById('handsBtn');
const cam = document.getElementById('cam');

let landmarker = null;
let stream = null;
let active = false;
let busy = false;
let rafId = null;
let pinchDown = false;
let lastPinchLockAt = 0;
let lastTimestamp = 0;

async function initLandmarker() {
  if (landmarker) return landmarker;
  handsBtn.textContent = 'loading…';
  const resolver = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
  );
  landmarker = await HandLandmarker.createFromOptions(resolver, {
    baseOptions: {
      modelAssetPath:
        'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
      delegate: 'GPU',
    },
    runningMode: 'VIDEO',
    numHands: 2,
  });
  return landmarker;
}

async function startHands() {
  if (!window.__theremin || !window.__theremin.hasAudio()) {
    alert('Click anywhere to start audio first.');
    return;
  }
  busy = true;
  handsBtn.disabled = true;
  try {
    await initLandmarker();
    stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' },
      audio: false,
    });
  } catch (err) {
    alert('Could not start hand tracking: ' + err.message);
    handsBtn.textContent = 'Hands: off';
    busy = false;
    handsBtn.disabled = false;
    return;
  }
  cam.srcObject = stream;
  cam.classList.add('visible');
  try { await cam.play(); } catch (_) {}
  active = true;
  window.__theremin.setHandsActive(true);
  handsBtn.classList.add('active');
  handsBtn.textContent = 'Hands: on';
  busy = false;
  handsBtn.disabled = false;
  lastTimestamp = 0;
  loop();
}

function stopHands() {
  active = false;
  if (rafId) cancelAnimationFrame(rafId);
  rafId = null;
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  cam.srcObject = null;
  cam.classList.remove('visible');
  handsBtn.classList.remove('active');
  handsBtn.textContent = 'Hands: off';
  if (window.__theremin) {
    window.__theremin.setHandsActive(false);
    window.__theremin.clearCursor();
  }
  pinchDown = false;
}

function loop() {
  if (!active) return;
  rafId = requestAnimationFrame(loop);
  if (cam.readyState < 2) return;
  let now = performance.now();
  if (now <= lastTimestamp) now = lastTimestamp + 1;
  lastTimestamp = now;
  let result;
  try {
    result = landmarker.detectForVideo(cam, now);
  } catch (_) {
    return;
  }
  const T = window.__theremin;
  if (!T) return;
  if (result.landmarks && result.landmarks.length > 0) {
    // The camera is mirrored via CSS but the model sees the raw frame, so
    // MediaPipe's "Left"/"Right" labels are flipped relative to the user.
    let rightHand = null; // user's right hand → cursor
    let leftHand = null;  // user's left hand → pinch to lock
    const hands = result.handedness || [];
    for (let i = 0; i < result.landmarks.length; i++) {
      const label = hands[i] && hands[i][0] && hands[i][0].categoryName;
      if (label === 'Right' && !rightHand) rightHand = result.landmarks[i];
      else if (label === 'Left' && !leftHand) leftHand = result.landmarks[i];
    }

    if (rightHand) {
      const tip = rightHand[8];
      const nx = 1 - tip.x;
      const ny = tip.y;
      const x = Math.max(0, Math.min(1, nx)) * T.W;
      const y = Math.max(0, Math.min(1, ny)) * T.H;
      T.setCursor(x, y);
    } else {
      T.clearCursor();
    }

    if (leftHand) {
      const tip = leftHand[8];
      const thumb = leftHand[4];
      const dx = thumb.x - tip.x;
      const dy = thumb.y - tip.y;
      const dist = Math.hypot(dx, dy);
      const PINCH_ON = 0.05;
      const PINCH_OFF = 0.09;
      if (!pinchDown && dist < PINCH_ON) {
        pinchDown = true;
        if (now - lastPinchLockAt > 200) {
          lastPinchLockAt = now;
          T.lock();
        }
      } else if (pinchDown && dist > PINCH_OFF) {
        pinchDown = false;
      }
    } else {
      pinchDown = false;
    }
  } else {
    T.clearCursor();
    pinchDown = false;
  }
}

handsBtn.addEventListener('click', () => {
  if (busy) return;
  handsBtn.blur();
  if (active) stopHands();
  else startHands();
});
</script>
</body>
</html>
